version: '3.8'

services:
  api:
    build: .
    container_name: seismocast-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    restart: always

  streamlit:
    build: .
    container_name: seismocast-ui
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - API_URL=http://api:8000
    depends_on:
      - api
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    restart: always
